<style>
  /* ========== 基础重置与变量 ========== */
  :root {
    --primary: #1a5f7a;
    --secondary: #57c5b6;
    --accent: #159895;
    --bg: #f5f7fa;
    --card-bg: #ffffff;
    --text-main: #333333;
    --text-sub: #666666;
    --border: #e0e0e0;
    --success: #52c41a;
    --warning: #faad14;
    --danger: #f5222d;
    --header-h: 60px;
    --sidebar-w: 240px;
    --font-main: "Microsoft YaHei", "PingFang SC", sans-serif;
    --font-num: "Consolas", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
  }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }
  button { font-family: var(--font-main); cursor: pointer; border: none; outline: none; }
  input, select, textarea { font-family: var(--font-main); outline: none; }

  /* ========== 顶部导航栏 ========== */
  .header {
    height: var(--header-h);
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-title { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .header-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 13px;
    transition: background 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.30); }
  .header-btn.primary { background: var(--secondary); }
  .header-btn.primary:hover { background: var(--accent); }

  /* ========== 左侧菜单 ========== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--card-bg);
    border-right: 1px solid var(--border);
    position: fixed;
    top: var(--header-h);
    left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 900;
    padding: 16px 0;
  }
  .nav-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    color: var(--text-main);
    font-size: 14px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: #f0f5ff; color: var(--primary); }
  .nav-item.active { background: #e6f7ff; color: var(--primary); border-left-color: var(--primary); font-weight: bold; }
  .nav-icon { width: 20px; text-align: center; margin-right: 10px; font-size: 16px; }
  .nav-divider { height: 1px; background: var(--border); margin: 8px 16px; }
  .nav-section-title { padding: 8px 20px; font-size: 12px; color: var(--text-sub); text-transform: uppercase; }

  /* ========== 主内容区 ========== */
  .main {
    margin-left: var(--sidebar-w);
    margin-top: var(--header-h);
    padding: 24px;
    min-height: calc(100vh - var(--header-h));
  }
  .page-title {
    font-size: 22px; font-weight: bold; color: var(--primary);
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 2px solid var(--secondary);
  }

  /* ========== 卡片 ========== */
  .card {
    background: var(--card-bg);
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 16px; font-weight: bold; color: var(--primary);

  .card-title::before {

<script>
/* ============================
   共享数据模型 (ProjectData)
   ============================ */
const STORAGE_KEY = 'feasibility_study_data';

const ProjectData = {

    depreciationMethod: 'straight',
    depreciationYears: 20,
    residualRate: 0.05,
    amortization: 0,
  }
};

// 加载数据
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      Object.assign(ProjectData.basic, parsed.basic || {});
      Object.assign(ProjectData.investment, parsed.investment || {});
      Object.assign(ProjectData.financing, parsed.financing || {});
      Object.assign(ProjectData.revenue, parsed.revenue || {});
      Object.assign(ProjectData.cost, parsed.cost || {});
    }
  } catch (e) { console.warn('加载数据失败', e); }
}

// 保存数据
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(ProjectData));
    localStorage.setItem('outline_progress', JSON.stringify(outlineProgress));

function showToast(msg) {

  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);

/* ============================
   核心计算函数 (Calculator)
   ============================ */
const Calculator = {
  // 直线法折旧
  calculateDepreciation: (originalValue, residualRate, years) => {
    return originalValue * (1 - residualRate) / years;
  },
  // 建设期利息（简化）
  calculateConstructionInterest: (loans, rate) => {
    // 各年应计利息 = (年初借款本息累计 + 本年借款额/2) × 年利率
    let totalInterest = 0;
    let cumulative = 0;
    for (let i = 0; i < loans.length; i++) {
      const yearInterest = (cumulative + loans[i] / 2) * rate;
      totalInterest += yearInterest;
      cumulative += loans[i] + yearInterest;
    }
    return totalInterest;
  },
  // 等额还本付息（年金法）
  calculateEqualPayment: (principal, rate, years) => {
    if (rate === 0) return principal / years;
    return principal * (rate * Math.pow(1 + rate, years)) / (Math.pow(1 + rate, years) - 1);
  },
  // NPV
  calculateNPV: (cashFlows, discountRate) => {
    let npv = 0;
    for (let t = 0; t < cashFlows.length; t++) {
      npv += cashFlows[t] / Math.pow(1 + discountRate, t);
    }
    return npv;
  },
  // IRR（牛顿迭代法）
  calculateIRR: (cashFlows, guess = 0.1) => {
    const maxIter = 100; const tol = 1e-6;
    let rate = guess;
    for (let i = 0; i < maxIter; i++) {
      let npv = 0, dnpv = 0;
      for (let t = 0; t < cashFlows.length; t++) {
        npv += cashFlows[t] / Math.pow(1 + rate, t);
        dnpv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
      }
      if (Math.abs(npv) < tol) return rate;
      if (Math.abs(dnpv) < tol) break;
      rate -= npv / dnpv;
      if (rate < -1) rate = -0.9999;
    }
    return null;
  },
  // 投资回收期
  calculatePaybackPeriod: (cashFlows) => {
    let cumulative = 0;
    for (let t = 0; t < cashFlows.length; t++) {
      const prev = cumulative;
      cumulative += cashFlows[t];
      if (cumulative >= 0 && prev < 0) {
        return t + Math.abs(prev) / cashFlows[t];
      }
    }
    return null;
  }
};

/* ============================
   状态管理
   ============================ */
let outlineProgress = {};
let currentTab = 'government';

function loadProgress() {
  try {
    const raw = localStorage.getItem('outline_progress');
    if (raw) outlineProgress = JSON.parse(raw);
  } catch (e) { outlineProgress = {}; }
}

function isDone(id) { return !!outlineProgress[id]; }
function toggleDone(id) {
  outlineProgress[id] = !outlineProgress[id];
  renderOutline();
  updateStats();
}

/* ============================
   渲染大纲
   ============================ */
function renderOutline() {
  renderPanel('outline-government', governmentOutline);
  renderPanel('outline-enterprise', enterpriseOutline);
}

function renderPanel(containerId, data) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = data.map(item => {
    const checked = isDone(item.id) ? 'checked' : '';
    const childrenHtml = item.children.map(child => {
      const cChecked = isDone(child.id) ? 'checked' : '';
      const tagClass = child.required ? 'required' : 'optional';
      const tagText = child.required ? '必写' : '可选';
      return `
        <div class="child-item" data-search="${child.title.toLowerCase()}">
          <div class="child-left">
            <span class="check-btn ${cChecked}" onclick="event.stopPropagation(); toggleDone('${child.id}')">${cChecked ? '✓' : ''}</span>
            <span class="child-number">${child.num}</span>
            <span class="child-title">${child.title}</span>
          </div>
          <div class="child-actions">
            <span class="child-tag ${tagClass}">${tagText}</span>
          </div>
        </div>`;
    }).join('');
    const descId = 'desc-' + item.id;
    return `
      <div class="outline-item ${isDone(item.id) ? 'expanded' : ''}" data-search="${item.title.toLowerCase()}" id="item-${item.id}">
        <div class="outline-header" onclick="toggleItem('${item.id}')">
          <div class="outline-header-left">
            <span class="check-btn ${checked}" onclick="event.stopPropagation(); toggleDone('${item.id}')">${checked ? '✓' : ''}</span>
            <span class="outline-number">${item.num}</span>
            <span class="outline-title-text">${item.title}</span>
          </div>
          <div class="outline-toggle"><span class="outline-toggle-icon">▶</span></div>
        </div>
        <div class="outline-children">
          ${childrenHtml}
          <div class="desc-panel ${isDone(item.id) ? 'show' : ''}" id="${descId}">
            <h4>📖 编写说明</h4>
            <p>${item.desc}</p>
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleItem(id) {
  const el = document.getElementById('item-' + id);
  el.classList.toggle('expanded');
  const desc = document.getElementById('desc-' + id);
  if (desc) desc.classList.toggle('show');
}

function expandAll() {
  document.querySelectorAll('.outline-item').forEach(el => el.classList.add('expanded'));
  document.querySelectorAll('.desc-panel').forEach(el => el.classList.add('show'));
}
function collapseAll() {
  document.querySelectorAll('.outline-item').forEach(el => el.classList.remove('expanded'));
  document.querySelectorAll('.desc-panel').forEach(el => el.classList.remove('show'));
}
function showAllDesc() { document.querySelectorAll('.desc-panel').forEach(el => el.classList.add('show')); }
function hideAllDesc() { document.querySelectorAll('.desc-panel').forEach(el => el.classList.remove('show')); }

function switchTab(type) {
  currentTab = type;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  document.getElementById('outline-government').style.display = type === 'government' ? 'block' : 'none';
  document.getElementById('outline-enterprise').style.display = type === 'enterprise' ? 'block' : 'none';
  updateStats();
}

function markAllDone(done) {
  const data = currentTab === 'government' ? governmentOutline : enterpriseOutline;
  data.forEach(item => {
    outlineProgress[item.id] = done;
    item.children.forEach(child => { outlineProgress[child.id] = done; });
  });
  renderOutline();
  updateStats();
  showToast(done ? '✅ 已全部标记为完成' : '⬜ 已全部标记为未完成');
}

/* ============================
   搜索与过滤
   ============================ */
function filterOutline(keyword) {
  const k = keyword.trim().toLowerCase();
  if (!k) {
    document.querySelectorAll('.outline-item').forEach(el => el.style.display = '');
    document.querySelectorAll('.child-item').forEach(el => el.style.display = '');
    return;
  }
  document.querySelectorAll('.outline-item').forEach(el => {
    const match = el.dataset.search.includes(k);
    el.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.child-item').forEach(el => {
    const match = el.dataset.search.includes(k);
    el.style.display = match ? '' : 'none';
  });
}

/* ============================
   统计更新
   ============================ */
function updateStats() {
  const data = currentTab === 'government' ? governmentOutline : enterpriseOutline;
  let total = 0, done = 0, required = 0;
  data.forEach(item => {
    total++;
    if (item.required) required++;
    if (isDone(item.id)) done++;
    item.children.forEach(child => {
      total++;
      if (child.required) required++;
      if (isDone(child.id)) done++;
    });
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-required').textContent = required;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('stat-progress').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

/* ============================
   导出功能
   ============================ */
function exportExcel() {
  showToast('📤 导出功能：请使用“投资估算”等报表模块的导出功能生成Excel文件。');
}

/* ============================
   初始化
   ============================ */
loadData();
loadProgress();
renderOutline();
updateStats();

// 页面可见时刷新
window.addEventListener('storage', () => { loadProgress(); renderOutline(); updateStats(); });
