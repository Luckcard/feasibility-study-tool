<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>评价指标 - 可研报告编写工具</title>
<style>
:root {
  --primary-color: #1a5f7a;
  --secondary-color: #57c5b6;
  --accent-color: #159895;
  --bg-color: #f5f7fa;
  --card-bg: #ffffff;
  --text-main: #333333;
  --text-secondary: #666666;
  --border-color: #e0e0e0;
  --success-color: #52c41a;
  --warning-color: #faad14;
  --danger-color: #f5222d;
  --header-height: 60px;
  --sidebar-width: 240px;
  --font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  --font-number: "Consolas", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-main); font-size: 14px; line-height: 1.5; }
.header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); background: var(--primary-color); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header .logo { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.sidebar { position: fixed; top: var(--header-height); left: 0; bottom: 0; width: var(--sidebar-width); background: var(--card-bg); border-right: 1px solid var(--border-color); overflow-y: auto; z-index: 900; padding: 8px 0; }
.menu-item { display: block; padding: 12px 24px; color: var(--text-main); text-decoration: none; font-size: 14px; border-left: 4px solid transparent; transition: all 0.2s; cursor: pointer; }
.menu-item:hover { background: #f0f9ff; color: var(--primary-color); }
.menu-item.active { background: #e6f7ff; color: var(--primary-color); border-left-color: var(--primary-color); font-weight: 600; }
.menu-item .icon { display: inline-block; width: 20px; text-align: center; margin-right: 8px; }
.main-content { margin-left: var(--sidebar-width); margin-top: var(--header-height); padding: 24px; min-height: calc(100vh - var(--header-height)); }
.page-title { font-size: 20px; font-weight: 600; color: var(--primary-color); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--secondary-color); }
.card { background: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; overflow: hidden; }
.card-header { background: var(--primary-color); color: #fff; padding: 12px 20px; font-size: 15px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.card-body { padding: 20px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: center; }
.data-table th { background: var(--primary-color); color: #fff; font-weight: 600; }
.data-table tr:nth-child(even) { background: #fafafa; }
.data-table tr:hover { background: #f0f9ff; }
.num { font-family: var(--font-number); text-align: right; }
.empty-state { text-align: center; padding: 40px; color: #999; }
.btn { display: inline-flex; align-items: center; justify-content: center; height: 36px; padding: 0 20px; border-radius: 4px; font-size: 14px; font-family: var(--font-family); cursor: pointer; border: 1px solid transparent; transition: all 0.2s; font-weight: 500; text-decoration: none; }
.btn-primary { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
.btn-primary:hover { background: #144a5e; border-color: #144a5e; }
.btn-default { background: #fff; color: var(--text-main); border-color: var(--border-color); }
.btn-default:hover { background: #f5f5f5; border-color: #d0d0d0; }
.btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
@media (max-width: 768px) { .sidebar { width: 0; transform: translateX(-100%); } .main-content { margin-left: 0; } }
</style>
</head>
<body>
<header class="header">
  <div class="logo">📊 可行性研究报告编写工具</div>
</header>
<nav class="sidebar">
  <a href="index.html" class="menu-item"><span class="icon">⚙️</span>首页与参数设置</a>
  <a href="outline.html" class="menu-item"><span class="icon">📝</span>可研报告大纲</a>
  <a href="investment.html" class="menu-item"><span class="icon">💰</span>投资估算</a>
  <a href="cost.html" class="menu-item"><span class="icon">📉</span>成本费用</a>
  <a href="profit-cashflow.html" class="menu-item"><span class="icon">📈</span>利润与现金流量</a>
  <a href="balance.html" class="menu-item"><span class="icon">🏦</span>资产负债与偿债</a>
  <a href="indicators.html" class="menu-item active"><span class="icon">🎯</span>评价指标</a>
</nav>
<main class="main-content">
  <div class="page-title">🎯 评价指标汇总</div>
  <div class="card">
    <div class="card-header">评价指标汇总表</div>
    <div class="card-body">
      <div class="empty-state">此模块开发中，请先完成「投资估算」「成本费用」「利润与现金流量」模块的数据录入。<br><br>数据将自动从其他模块同步。</div>
    </div>
  </div>
</main>
</body>
</html>
